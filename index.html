<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tải cấu hình iOS (.mobileconfig)</title>

<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;margin:0;padding:24px;line-height:1.45}
.card{max-width:720px;margin:0 auto;padding:20px;border:1px solid #e5e7eb;border-radius:14px}
h1{font-size:20px;margin:0 0 12px}
.btn{display:inline-block;padding:12px 16px;border-radius:12px;text-decoration:none;font-weight:600;border:1px solid #111827}
.btn:active{transform:scale(.98)}
.muted{color:#6b7280;font-size:14px}
code{background:#f3f4f6;padding:2px 6px;border-radius:6px}
</style>
</head>

<body>
<div class="card">
<h1>📲 Tải & cài đặt cấu hình iOS</h1>

<p>Nhấn nút bên dưới để tải file <code>.mobileconfig</code> mới nhất.</p>

<p>
  <a class="btn" id="downloadBtn" href="#">
    Đang lấy link...
  </a>
</p>

<p class="muted" id="status"></p>
</div>

<script>
const USER = "bangcs1";
const REPO = "dns";

async function getLatestRelease() {
  const btn = document.getElementById("downloadBtn");
  const status = document.getElementById("status");

  try {
    const res = await fetch(
      `https://api.github.com/repos/${USER}/${REPO}/releases/latest`
    );

    const data = await res.json();

    // tìm file mobileconfig
    const asset = data.assets.find(a =>
      a.name.endsWith(".mobileconfig")
    );

    if (!asset) {
      btn.innerText = "Không tìm thấy file";
      status.innerText = "Release chưa có file .mobileconfig";
      return;
    }

    btn.href = asset.browser_download_url;
    btn.innerText = "Tải / Cài đặt mobileconfig";
    status.innerText = "✔ Đã lấy link release mới nhất";

  } catch (e) {
    btn.innerText = "Lỗi tải link";
    status.innerText = "Không lấy được release từ GitHub";
  }
}

getLatestRelease();
</script>

</body>
</html>
